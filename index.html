<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- iOS PWA Icons (Safari ignores Web App Manifest icons) -->
    <link rel="apple-touch-icon" href="/grades/icons/icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/grades/icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/grades/icons/icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/grades/icons/icon-180.png">
    <!-- iOS Splash / Standalone config -->
    <meta name="apple-mobile-web-app-title" content="Grades">
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var shouldBeDark = t === 'dark' || (!t) || (t === 'system' && dark);
          document.documentElement.classList.toggle('dark', shouldBeDark);
        } catch (e) {}
      })();
    </script>
    <title>M.Sc. Economics Grade Tracker</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
    <!-- Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"></noscript>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        transition: font-variation-settings 0.2s ease;
      }
      /* Loading Screen Styles */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        z-index: 9999;
        transition: opacity 0.4s ease-out;
      }
      html.dark #initial-loader {
        background-color: #09090b;
      }
      .loader-logo {
        width: 64px;
        height: 64px;
        position: relative;
        color: #18181b;
      }
      html.dark .loader-logo {
        color: #f4f4f5;
        filter: drop-shadow(0 0 16px rgba(244, 244, 245, 0.15));
      }
      .loader-track {
        fill: none;
        stroke: currentColor;
        stroke-width: 1.5;
        opacity: 0.1;
      }
      .loader-line {
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
      }
      .line-main { 
        stroke-width: 4; 
        animation: flow 2s cubic-bezier(0.7, 0, 0.3, 1) infinite; 
      }
      
      @keyframes flow {
        0% { stroke-dashoffset: 120; }
        40%, 60% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -120; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Splash Screen / Loader -->
      <div id="initial-loader">
        <svg class="loader-logo" viewBox="0 0 64 64">
          <path class="loader-track" d="M 46 24 C 46 18 42 16 32 16 C 22 16 18 18 18 24 L 18 40 C 18 46 22 48 32 48 C 42 48 46 46 46 40 L 46 32 L 34 32" />
          <path class="loader-line line-main" d="M 46 24 C 46 18 42 16 32 16 C 22 16 18 18 18 24 L 18 40 C 18 46 22 48 32 48 C 42 48 46 46 46 40 L 46 32 L 34 32" />
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
