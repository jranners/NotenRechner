<!DOCTYPE html>

<html class="dark" lang="de"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modul hinzufügen - M.Sc. Economics Grade Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#005236",
              "surface": "#0c1324",
              "on-error": "#690005",
              "primary-fixed": "#d8e2ff",
              "outline": "#8c909f",
              "outline-variant": "#424754",
              "surface-tint": "#adc6ff",
              "secondary-container": "#00a572",
              "primary-fixed-dim": "#adc6ff",
              "primary": "#adc6ff",
              "error-container": "#93000a",
              "on-primary-container": "#00285d",
              "surface-container-lowest": "#070d1f",
              "on-surface-variant": "#c2c6d6",
              "inverse-primary": "#005ac2",
              "on-primary-fixed-variant": "#004395",
              "tertiary-container": "#8083ff",
              "on-error-container": "#ffdad6",
              "background": "#0c1324",
              "on-secondary-fixed": "#002113",
              "surface-dim": "#0c1324",
              "inverse-surface": "#dce1fb",
              "surface-container-low": "#151b2d",
              "primary-container": "#4d8eff",
              "on-primary": "#002e6a",
              "on-tertiary-container": "#0d0096",
              "surface-variant": "#2e3447",
              "tertiary": "#c0c1ff",
              "on-tertiary": "#1000a9",
              "on-tertiary-fixed-variant": "#2f2ebe",
              "on-background": "#dce1fb",
              "error": "#ffb4ab",
              "surface-container-high": "#23293c",
              "tertiary-fixed": "#e1e0ff",
              "inverse-on-surface": "#2a3043",
              "secondary-fixed": "#6ffbbe",
              "on-primary-fixed": "#001a42",
              "secondary-fixed-dim": "#4edea3",
              "secondary": "#4edea3",
              "surface-container-highest": "#2e3447",
              "tertiary-fixed-dim": "#c0c1ff",
              "surface-container": "#191f31",
              "on-secondary-container": "#00311f",
              "on-surface": "#dce1fb",
              "on-secondary": "#003824",
              "on-tertiary-fixed": "#07006c",
              "surface-bright": "#33394c"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .neon-glow-primary {
        box-shadow: 0 0 15px rgba(173, 198, 255, 0.3);
      }
      .neon-glow-secondary {
        box-shadow: 0 0 15px rgba(78, 222, 163, 0.3);
      }
      /* Custom Date Picker Styling */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(0.8) sepia(100%) saturate(500%) hue-rotate(180deg);
        cursor: pointer;
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen overflow-hidden">
<!-- Dashboard Background (Simulated) -->
<div class="fixed inset-0 z-0 opacity-40 blur-sm pointer-events-none">
<header class="flex justify-between items-center px-6 py-4 w-full bg-[#0c1324]/40 backdrop-blur-xl">
<span class="text-lg font-bold tracking-tight text-[#adc6ff] font-headline">M.Sc. Economics Grade Tracker</span>
<span class="material-symbols-outlined text-[#adc6ff]">account_circle</span>
</header>
<main class="p-6 space-y-8 max-w-5xl mx-auto">
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="h-32 bg-surface-container-low rounded-xl"></div>
<div class="h-32 bg-surface-container-low rounded-xl"></div>
<div class="h-32 bg-surface-container-low rounded-xl"></div>
</div>
<div class="h-64 bg-surface-container rounded-xl w-full"></div>
<div class="h-64 bg-surface-container rounded-xl w-full"></div>
</main>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-surface-container-lowest/80 backdrop-blur-md z-40"></div>
<!-- Bottom Sheet Modal -->
<div class="fixed inset-x-0 bottom-0 z-50 transform transition-transform duration-300 ease-out flex flex-col items-center">
<!-- Handle for Drag (Visual only) -->
<div class="w-12 h-1.5 bg-outline-variant rounded-full mb-3 opacity-50"></div>
<div class="w-full max-w-2xl bg-surface-container-low rounded-t-[2rem] border-x border-t border-outline-variant/15 p-8 pb-12 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
<!-- Modal Header -->
<div class="flex justify-between items-start mb-10">
<div>
<h2 class="text-2xl font-extrabold font-headline tracking-tight text-on-surface">Modul hinzufügen/bearbeiten</h2>
<p class="text-on-surface-variant text-sm mt-1 font-label uppercase tracking-widest">Akademisches Audit System</p>
</div>
<button class="p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Form -->
<form class="space-y-10">
<!-- Module Select -->
<div class="group">
<label class="block text-on-surface-variant text-[0.6875rem] font-label font-semibold uppercase tracking-[0.05em] mb-3 ml-1">
                        Modul Auswählen
                    </label>
<div class="relative">
<select class="w-full bg-surface-container border-b-2 border-outline-variant focus:border-primary focus:ring-0 text-on-surface py-4 px-4 appearance-none transition-all cursor-pointer rounded-t-lg">
<option disabled="" selected="">Wählen Sie ein Modul...</option>
<option>BM Macroeconomics (6 ECTS)</option>
<option>BM Econometrics (6 ECTS)</option>
</select>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary">expand_more</span>
</div>
</div>
</div>
<!-- Grade Selection -->
<div>
<label class="block text-on-surface-variant text-[0.6875rem] font-label font-semibold uppercase tracking-[0.05em] mb-4 ml-1">
                        Erreichte Note
                    </label>
<div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
<!-- Grade Pill Logic -->
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">1.0</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">1.3</button>
<button class="py-2.5 px-1 bg-primary/20 border-2 border-primary text-primary neon-glow-primary rounded-lg text-sm font-bold transition-all" type="button">1.7</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">2.0</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">2.3</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">2.7</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">3.0</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">3.3</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">3.7</button>
<button class="py-2.5 px-1 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-sm font-medium hover:border-primary transition-all" type="button">4.0</button>
<button class="col-span-2 py-2.5 px-3 bg-surface-container-highest/40 border border-outline-variant/20 rounded-lg text-[10px] uppercase font-bold tracking-wider hover:border-primary transition-all leading-tight" type="button">Bestanden<br/>(Unbenotet)</button>
</div>
</div>
<!-- Date and Metadata -->
<div class="flex flex-col sm:flex-row gap-8">
<div class="flex-1">
<label class="block text-on-surface-variant text-[0.6875rem] font-label font-semibold uppercase tracking-[0.05em] mb-3 ml-1">
                            Prüfungsdatum
                        </label>
<input class="w-full bg-surface-container-highest/20 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-on-surface py-3 px-1 transition-all" type="date"/>
</div>
<div class="flex-1 hidden sm:block">
<div class="p-4 bg-secondary/5 rounded-xl border border-secondary/20 flex items-center gap-4">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">info</span>
<div>
<p class="text-[10px] font-label uppercase text-secondary font-bold tracking-wider">ECTS Ertrag</p>
<p class="text-lg font-headline font-extrabold text-on-surface">+6.0 Credits</p>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-4 pt-6">
<button class="flex-1 py-4 px-6 rounded-xl border border-outline-variant text-on-surface font-bold font-label uppercase tracking-widest text-sm hover:bg-surface-variant transition-all order-2 sm:order-1" type="button">
                        Abbrechen
                    </button>
<button class="flex-1 py-4 px-6 rounded-xl bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-black font-label uppercase tracking-[0.1em] text-sm neon-glow-primary hover:scale-[1.02] active:scale-95 transition-all order-1 sm:order-2 shadow-lg" type="submit">
                        Speichern
                    </button>
</div>
</form>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
</body></html>
